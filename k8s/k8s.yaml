apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: 730335608828.dkr.ecr.us-east-2.amazonaws.com/auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "180Mi"
              cpu: "100m"
            limits:
              memory: "350Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /auth/actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /auth/actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          env:
            - name: JWT_HTTP_ONLY
              value: "true"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-credentials
                  key: jwt-secret-key
            - name: JWT_EXPIRATION
              value: "3600"

---

apiVersion: v1
kind: Service
metadata:
  name: auth
spec:
  selector:
    app: auth
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP