server:
  port: 8080
  
spring:
  application:
    name: auth

store:
  jwt:
    secretKey: ${JWT_SECRET_KEY}
    duration: 86400000 # 24 hours in milliseconds
    httpOnly: ${JWT_HTTP_ONLY}
    
management:
  endpoints:
    web:
      base-path: /auth/actuator
      exposure:
        include: ['prometheus', 'health']